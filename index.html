<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSRS Combat Achievement Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --accent:#534AB7;--radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1c;--bg2:#242424;--bg3:#2a2a2a;
  --text:#f0efe9;--text2:#aaa;--text3:#666;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.container{max-width:1120px;margin:0 auto;padding:0 16px}
.header{background:var(--bg);border-bottom:0.5px solid var(--border2);position:sticky;top:0;z-index:100;padding:10px 0}
.header-inner{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
h1{font-size:15px;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:6px}
.wom-row{display:flex;align-items:center;gap:8px;flex:1}
input[type=text]{height:32px;border:0.5px solid var(--border2);border-radius:var(--radius);padding:0 10px;background:var(--bg2);color:var(--text);font-size:13px;outline:none}
input[type=text]:focus{border-color:var(--accent)}
.wom-row input[type=text]{width:220px}
button{height:32px;padding:0 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:background .1s}
button:hover{background:var(--bg3)}
button:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff;border-color:transparent}
.btn-primary:hover{opacity:.9;background:var(--accent)}
.btn-active{background:var(--accent)!important;color:#fff!important;border-color:transparent!important}
.player-badge{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;background:var(--bg2);border:0.5px solid var(--border);border-radius:20px}
.controls{background:var(--bg);border-bottom:0.5px solid var(--border);padding:8px 0}
.tier-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tier-btn{height:26px;padding:0 12px;border-radius:20px;border:0.5px solid;cursor:pointer;font-size:11px;font-weight:500;background:transparent;display:inline-flex;align-items:center}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.search-wrap input{width:100%;padding-left:30px}
.stats-bar{padding:8px 0;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.prog-bar{flex:1;min-width:160px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.table-wrap{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);overflow:hidden;margin-bottom:40px}
.tbl-head{display:grid;grid-template-columns:28px 90px 1fr 1.6fr 130px 28px;gap:8px;padding:7px 12px;border-bottom:0.5px solid var(--border2);font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;background:var(--bg2)}
.task-row{display:grid;grid-template-columns:28px 90px 1fr 1.6fr 130px 28px;gap:8px;padding:8px 12px;border-bottom:0.5px solid var(--border);align-items:start;transition:background .1s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:var(--bg2)}
.task-row.done{opacity:.4}
.task-row.done .tname{text-decoration:line-through}
.task-row.planned{background:color-mix(in srgb,var(--accent) 7%,var(--bg))}
.task-row.planned .tname{color:var(--accent)}
input[type=checkbox]{width:15px;height:15px;margin-top:2px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.plan-bar{padding:6px 0 2px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text2)}
.plan-prog{flex:1;min-width:120px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.plan-fill{height:100%;background:#C6A227;border-radius:3px;transition:width .3s}
.tier-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.tname{font-size:13px;font-weight:500}
.tdesc{font-size:12px;color:var(--text2);line-height:1.4}
.tboss{font-size:12px;color:var(--text2);display:flex;flex-direction:column;gap:3px}
.kc-badge{font-size:11px;color:#3B6D11;background:#EAF3DE;padding:1px 6px;border-radius:8px;width:fit-content}
.hide-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:15px}
.hide-btn:hover{color:var(--text);background:var(--bg3)}
.empty{padding:48px;text-align:center;color:var(--text3)}
.empty i{font-size:32px;display:block;margin-bottom:8px}
.main{padding:12px 0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:9px 18px;border-radius:var(--radius);font-size:13px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999;white-space:nowrap}
.toast.show{opacity:1}
.header-actions{display:flex;gap:6px;margin-left:auto}
.ws-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center}
.ws-overlay.open{display:flex}
.ws-box{background:var(--bg1);border:1px solid var(--border2);border-radius:8px;padding:20px;width:520px;max-width:92vw;display:flex;flex-direction:column;gap:12px}
.ws-box h3{margin:0;font-size:14px;font-weight:600}
.ws-box p{margin:0;font-size:12px;color:var(--text2);line-height:1.5}
.ws-box code{background:var(--bg3);padding:2px 5px;border-radius:3px;font-size:11px;word-break:break-all}
.ws-box textarea{width:100%;height:110px;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:11px;padding:8px;resize:vertical;font-family:monospace;box-sizing:border-box}
.ws-actions{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>

<div class="header">
<div class="container">
<div class="header-inner">
  <h1><i class="ti ti-sword" aria-hidden="true"></i> CA Tracker</h1>
  <div class="wom-row">
    <input type="text" id="ign" placeholder="RSN (e.g. Ai Yeon-ae)" autocomplete="off">
    <button class="btn-primary" id="sync-btn" onclick="loadWOM()"><i class="ti ti-refresh" aria-hidden="true"></i> Sync KC</button>
    <button id="ws-btn" onclick="loadWikiSync()"><i class="ti ti-shield-check" aria-hidden="true"></i> WikiSync</button>
    <span id="player-info"></span>
  </div>
  <div class="header-actions">
    <button onclick="exportData()" title="Export as JSON"><i class="ti ti-download" aria-hidden="true"></i> Export</button>
    <button onclick="document.getElementById('imp').click()" title="Import JSON"><i class="ti ti-upload" aria-hidden="true"></i> Import</button>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>
</div>
</div>

<div class="controls">
<div class="container">
  <div class="tier-row" id="tier-row">
    <button class="tier-btn" data-tier="all" style="color:var(--text);border-color:var(--border2)">All</button>
    <button class="tier-btn" data-tier="Easy" style="color:#3B6D11;border-color:#639922">Easy</button>
    <button class="tier-btn" data-tier="Medium" style="color:#185FA5;border-color:#378ADD">Medium</button>
    <button class="tier-btn" data-tier="Hard" style="color:#854F0B;border-color:#BA7517">Hard</button>
    <button class="tier-btn" data-tier="Elite" style="color:#993C1D;border-color:#D85A30">Elite</button>
    <button class="tier-btn" data-tier="Master" style="color:#3C3489;border-color:#534AB7">Master</button>
    <button class="tier-btn" data-tier="Grandmaster" style="color:#791F1F;border-color:#A32D2D">Grandmaster</button>
  </div>
  <div class="filter-row">
    <div class="search-wrap">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="search" placeholder="Search tasks, bosses…" oninput="render()">
    </div>
    <button id="btn-hide-done" onclick="toggleOpt('hideDone','btn-hide-done')"><i class="ti ti-eye-off" aria-hidden="true"></i> Hide done</button>
    <button id="btn-show-hidden" onclick="toggleOpt('showHidden','btn-show-hidden')"><i class="ti ti-eye" aria-hidden="true"></i> Show hidden</button>
    <button onclick="clearHidden()"><i class="ti ti-restore" aria-hidden="true"></i> Restore hidden</button>
  </div>
</div>
</div>

<div class="main">
<div class="container">
  <div class="stats-bar">
    <span id="stat-text">Loading…</span>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <span id="stat-pct">0%</span>
  </div>
  <div class="plan-bar" id="plan-bar" style="display:none">
    <i class="ti ti-list-check"></i>
    <span id="plan-text">0 pts planned</span>
    <div class="plan-prog"><div class="plan-fill" id="plan-fill" style="width:0%"></div></div>
    <span id="plan-target">0 / 466 pts toward next tier</span>
  </div>
  <div class="table-wrap">
    <div class="tbl-head">
      <span></span><span>Tier</span><span>Task</span><span>Description</span><span>Boss</span><span></span>
    </div>
    <div id="task-list"></div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<div class="ws-overlay" id="ws-overlay" onclick="if(event.target===this)closeWsModal()">
  <div class="ws-box">
    <h3><i class="ti ti-shield-check"></i> WikiSync Import</h3>
    <p>1. Open this URL in your browser (while logged in):<br>
    <code id="ws-url">https://sync.runescape.wiki/runelite/player/YOUR_NAME/STANDARD</code></p>
    <p>2. Select all text on that page (Ctrl+A), copy it, and paste below:</p>
    <textarea id="ws-json" placeholder='{"combat_achievements":[0,24,28,...]}'></textarea>
    <div class="ws-actions">
      <button onclick="closeWsModal()">Cancel</button>
      <button class="btn-primary" onclick="applyWikiSync()"><i class="ti ti-check"></i> Apply</button>
    </div>
  </div>
</div>

const S={completed:new Set(),planned:new Set(),hidden:new Set(),bossKC:{},activeTier:'all',hideDone:false,showHidden:false,playerType:'',caPoints:0};

function load(){
  try{
    const d=JSON.parse(localStorage.getItem('osrs-ca-v1')||'{}');
    S.completed=new Set(d.completed||[]);
    S.planned=new Set(d.planned||[]);
    S.hidden=new Set(d.hidden||[]);
    S.bossKC=d.bossKC||{};
    S.playerType=d.playerType||'';
    S.caPoints=d.caPoints||0;
    if(d.username) document.getElementById('ign').value=d.username;
    if(d.username&&S.playerType) showBadge(d.username,S.playerType,S.caPoints);
  }catch(e){}
}

function save(){
  const ign=document.getElementById('ign').value.trim();
  localStorage.setItem('osrs-ca-v1',JSON.stringify({
    completed:[...S.completed],planned:[...S.planned],hidden:[...S.hidden],bossKC:S.bossKC,
    username:ign,playerType:S.playerType,caPoints:S.caPoints
  }));
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

function showBadge(name,type,pts){
  const icons={ironman:'<i class="ti ti-hammer"></i>',hardcore_ironman:'<i class="ti ti-skull"></i>',ultimate_ironman:'<i class="ti ti-crown"></i>'};
  const labels={ironman:'Ironman',hardcore_ironman:'HCIM',ultimate_ironman:'UIM'};
  let h=`<div class="player-badge">${icons[type]||''}<strong>${name}</strong>`;
  if(labels[type]) h+=` <span style="color:var(--text3);font-size:11px">${labels[type]}</span>`;
  if(pts>0) h+=` <span style="color:var(--text3);font-size:11px">· ${pts.toLocaleString()} CA pts</span>`;
  h+=`</div>`;
  document.getElementById('player-info').innerHTML=h;
}

async function loadWOM(){
  const ign=document.getElementById('ign').value.trim();
  if(!ign){toast('Enter your RSN first');return;}
  const btn=document.getElementById('sync-btn');
  btn.innerHTML='<i class="ti ti-loader-2"></i> Loading…';btn.disabled=true;
  try{
    await fetch(`https://api.wiseoldman.net/v2/players/${encodeURIComponent(ign)}`,{method:'POST',headers:{'Content-Type':'application/json'}}).catch(()=>{});
    const res=await fetch(`https://api.wiseoldman.net/v2/players/${encodeURIComponent(ign)}`);
    if(!res.ok) throw new Error(`"${ign}" not found on Wise Old Man. Make sure the name is exact.`);
    const data=await res.json();
    const bosses=data.latestSnapshot?.data?.bosses||{};
    const acts=data.latestSnapshot?.data?.activities||{};
    S.bossKC={};
    for(const [k,v] of Object.entries(bosses)){
      const mapped=WOM[k];
      const kc=v.kills??v.score??-1;
      if(mapped&&kc>0) S.bossKC[mapped]=kc;
    }
    const caEntry=acts.combatAchievementPoints??acts.combat_achievement_points;
    S.caPoints=caEntry?(caEntry.score??caEntry.kills??0):0;
    S.playerType=data.type||'regular';
    showBadge(data.displayName||ign,S.playerType,S.caPoints);
    save();render();
    toast(`Loaded KCs for ${data.displayName||ign} — ${Object.keys(S.bossKC).length} bosses tracked`);
  }catch(e){toast(e.message);}
  finally{btn.innerHTML='<i class="ti ti-refresh"></i> Sync KC';btn.disabled=false;}
}

async function loadWikiSync(){
  const ign=document.getElementById('ign').value.trim();
  if(!ign){toast('Enter your RSN first');return;}
  const btn=document.getElementById('ws-btn');
  btn.innerHTML='<i class="ti ti-loader-2"></i> Syncing…';btn.disabled=true;
  try{
    const apiUrl=`https://sync.runescape.wiki/runelite/player/${encodeURIComponent(ign)}/STANDARD`;
    let data;
    try{
      const r=await fetch(apiUrl);
      data=await r.json();
    }catch{
      const r=await fetch(`https://corsproxy.io/?${apiUrl}`);
      data=await r.json();
    }
    if(data.error) throw new Error(`WikiSync: ${data.error}`);
    const ids=new Set(data.combat_achievements||[]);
    let added=0;
    for(const t of T){
      const id=CA_IDS[t.name];
      if(id!==undefined&&ids.has(id)&&!S.completed.has(t.name)){S.completed.add(t.name);added++;}
    }
    save();render();
    toast(`WikiSync: marked ${added} new task${added===1?'':'s'} done (${ids.size} completed in-game)`);
  }catch(e){
    toast((e.message||'WikiSync fetch failed')+'  — use paste mode below');
    openWsModal();
  }
  finally{btn.innerHTML='<i class="ti ti-shield-check"></i> WikiSync';btn.disabled=false;}
}

function openWsModal(){
  const ign=document.getElementById('ign').value.trim();
  const url=`https://sync.runescape.wiki/runelite/player/${encodeURIComponent(ign||'YOUR_NAME')}/STANDARD`;
  document.getElementById('ws-url').textContent=url;
  document.getElementById('ws-json').value='';
  document.getElementById('ws-overlay').classList.add('open');
  document.getElementById('ws-json').focus();
}
function closeWsModal(){
  document.getElementById('ws-overlay').classList.remove('open');
}
function applyWikiSync(){
  try{
    const data=JSON.parse(document.getElementById('ws-json').value.trim());
    const ids=new Set(data.combat_achievements||[]);
    if(!ids.size){toast('No combat_achievements found in JSON');return;}
    let added=0;
    for(const t of T){
      const id=CA_IDS[t.name];
      if(id!==undefined&&ids.has(id)&&!S.completed.has(t.name)){
        S.completed.add(t.name);added++;
      }
    }
    save();render();closeWsModal();
    toast(`WikiSync: marked ${added} new task${added===1?'':'s'} done (${ids.size} completed in-game)`);
  }catch{toast('Invalid JSON — copy the full page text from the WikiSync URL');}
}

function exportData(){
  const ign=document.getElementById('ign').value.trim();
  const blob=new Blob([JSON.stringify({username:ign,completed:[...S.completed],planned:[...S.planned],hidden:[...S.hidden],bossKC:S.bossKC,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`osrs-ca-${ign||'tracker'}.json`;a.click();URL.revokeObjectURL(a.href);
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      S.completed=new Set(d.completed||[]);S.planned=new Set(d.planned||[]);S.hidden=new Set(d.hidden||[]);S.bossKC=d.bossKC||{};
      if(d.username) document.getElementById('ign').value=d.username;
      save();render();toast('Progress imported');
    }catch{toast('Invalid file');}
  };
  r.readAsText(file);e.target.value='';
}

function toggleOpt(key,btnId){
  S[key]=!S[key];
  const btn=document.getElementById(btnId);
  btn.style.background=S[key]?'var(--accent)':'';
  btn.style.color=S[key]?'#fff':'';
  btn.style.borderColor=S[key]?'transparent':'';
  render();
}

function clearHidden(){S.hidden.clear();save();render();toast('All hidden tasks restored');}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const list=document.getElementById('task-list');
  const filtered=T.filter(t=>{
    if(!S.showHidden&&S.hidden.has(t.name)) return false;
    if(S.activeTier!=='all'&&t.tier!==S.activeTier) return false;
    if(S.hideDone&&S.completed.has(t.name)) return false;
    if(q&&!t.name.toLowerCase().includes(q)&&!t.desc.toLowerCase().includes(q)&&!t.boss.toLowerCase().includes(q)) return false;
    return true;
  });
  if(!filtered.length){
    list.innerHTML='<div class="empty"><i class="ti ti-mood-empty"></i>No tasks match current filters.</div>';
  } else {
    list.innerHTML=filtered.map(t=>{
      const done=S.completed.has(t.name);
      const plan=S.planned.has(t.name);
      const hid=S.hidden.has(t.name);
      const c=TS[t.tier];
      const safeN=t.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const cls=done?' done':plan?' planned':'';
      return `<div class="task-row${cls}">
<input type="checkbox"${plan?' checked':''} onchange="toggle('${safeN}')"${done?' disabled':''}>
<span><span class="tier-badge" style="background:${c.bg};color:${c.text}">${t.tier}</span></span>
<span class="tname">${t.name}</span>
<span class="tdesc">${t.desc}</span>
<span class="tboss">${t.boss}</span>
<button class="hide-btn" onclick="hide('${safeN}')" title="${hid?'Restore':'Hide'}"><i class="ti ${hid?'ti-eye':'ti-eye-off'}" aria-hidden="true"></i></button>
</div>`;
    }).join('');
  }
  const done=S.completed.size;
  const total=T.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('stat-text').textContent=`${filtered.length} shown · ${done}/${total} completed · ${S.hidden.size} hidden`;
  document.getElementById('stat-pct').textContent=`${pct}%`;
  document.getElementById('prog-fill').style.width=`${pct}%`;

  const TARGET=466;
  const planPts=T.reduce((sum,t)=>sum+(S.planned.has(t.name)&&!S.completed.has(t.name)?TP[t.tier]||0:0),0);
  const planBar=document.getElementById('plan-bar');
  if(planPts>0){
    planBar.style.display='flex';
    document.getElementById('plan-text').textContent=`${S.planned.size} task${S.planned.size===1?'':'s'} selected`;
    document.getElementById('plan-target').textContent=`${planPts} / ${TARGET} pts toward next tier`;
    document.getElementById('plan-fill').style.width=`${Math.min(100,Math.round(planPts/TARGET*100))}%`;
  } else {
    planBar.style.display='none';
  }
}

function toggle(name){
  if(S.planned.has(name)) S.planned.delete(name); else S.planned.add(name);
  save();render();
}
function hide(name){
  if(S.hidden.has(name)) S.hidden.delete(name); else S.hidden.add(name);
  save();render();
}

// Tier buttons
document.getElementById('tier-row').addEventListener('click',e=>{
  const btn=e.target.closest('.tier-btn');if(!btn)return;
  S.activeTier=btn.dataset.tier;
  document.querySelectorAll('.tier-btn').forEach(b=>{
    const tier=b.dataset.tier;const tc=TS[tier];
    b.style.background='transparent';
    b.style.color=tier==='all'?'var(--text)':(tc?.text||'var(--text)');
    b.style.borderColor=tier==='all'?'var(--border2)':(tc?.text||'var(--border2)');
    b.style.fontWeight='500';
  });
  btn.style.background=btn.dataset.tier==='all'?'var(--text2)':(TS[btn.dataset.tier]?.text||'var(--accent)');
  btn.style.color='#fff';btn.style.borderColor='transparent';
  render();
});

document.getElementById('ign').addEventListener('keydown',e=>{if(e.key==='Enter')loadWOM();});

// Init — click "All" button
document.querySelector('[data-tier="all"]').style.background='var(--text2)';
document.querySelector('[data-tier="all"]').style.color='#fff';
document.querySelector('[data-tier="all"]').style.borderColor='transparent';
load();render();
</script>
</body>
</html>
